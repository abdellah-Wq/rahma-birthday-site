<div class="container">

<h1>💌 Message</h1>

<div class="card">
<p id="typed"></p>
</div>

</div>

<script>
let text = "Dear Rahma, you are not just a memory... you are a feeling that stayed even when everything else faded.";
let i = 0;

function typeWriter(){
    if(i < text.length){
        document.getElementById("typed").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 45);
    }
}
window.onload = typeWriter;
</script>
